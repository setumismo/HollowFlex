<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e0f5ff",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1d23",
                        "abyss": "#222A35",
                        "cardboard": "#a68a64",
                        "felt-grey": "#4a5568"
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .felt-texture {
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 4px 4px;
        }
        .cardboard-edge {
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2), inset 0 2px 0 rgba(255,255,255,0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display flex items-center justify-center min-h-screen p-4">
<!-- Mobile Widget Container -->
<div class="relative w-full max-w-md bg-abyss rounded-xl overflow-hidden shadow-2xl border border-slate-700/50 felt-texture">
<!-- Header / Status Bar Area -->
<div class="flex items-center p-4 justify-between bg-black/20 backdrop-blur-sm">
<div class="flex size-10 shrink-0 items-center overflow-hidden rounded-full border-2 border-primary/30">
<img class="w-full h-full object-cover" data-alt="Small amigurumi knight avatar icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAnnB-KJAw7hAASD7EGK1gQAP9FPHj7jvwzRxQnwGMuUriVxGBEQPL5ciqbgBJ5rflyc4NVvXILQNMAZvr44dKk4124L5q72QguOFHBmoSur01iSQuaAD5Ek4TcyhmvFoXI2trdoGkAWE4deVs0WA45aPOAgSZ_J6WwwjrE5rKb-ppuxt76Qql38oxT8Y27lRXEwpADsL3GyN1lB6pY5CDNSV4PiA7QPOFxACvNNxVC-h4Z7PL_1KUf_H-c2Nw1JTZHl_kwrTY684In"/>
</div>
<div class="flex-1 px-3">
<h2 class="text-slate-100 text-base font-bold leading-tight tracking-tight">Hollow Flex</h2>
<p class="text-primary/60 text-xs font-medium">Daily Challenge</p>
</div>
<div class="flex gap-2">
<span class="material-symbols-outlined text-primary/80 text-xl">notifications</span>
</div>
</div>
<!-- Main Content Area (Crafty Style) -->
<div class="p-5 flex flex-col gap-4">
<!-- Character & Mission Card Row -->
<div class="flex gap-4 items-center">
<!-- Exhausted Knight Amigurumi -->
<div class="w-1/3 aspect-square relative group">
<div class="absolute inset-0 bg-primary/5 rounded-full blur-xl"></div>
<img class="relative w-full h-full object-contain drop-shadow-[0_10px_10px_rgba(0,0,0,0.5)]" data-alt="Amigurumi Hollow Knight looking tired and exhausted" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCMhz54GvZ1WrIO492F7LZqkZZS58uV4lBbZFAjCLhgtuWvMv9znoeJhU-nWu99dwdBRAoEwI4kzrEIgUFEIKVOlUVtRUUUcFDNiVBQeL_uwpSmv_XZ5nmCd5NphCW_Moc-0JwX2Blge-9lopbqLgDG62zv5yoI9xRwBv7KYrc3dyUI0kHAdzKINr_NGU54csmFAH5JJorBmeW6omxQxrZYDd3Tp4hVxb0eVudgZWsg2VVvMXE9dUI9-em7aeIQoVv_YPdiTNfwa0I6"/>
</div>
<!-- Mission Card (Cardboard Texture Style) -->
<div class="flex-1 bg-cardboard/90 p-4 rounded-lg cardboard-edge border-l-4 border-amber-900/30 transform -rotate-1 shadow-lg">
<p class="text-amber-950 text-xs font-black uppercase tracking-wider mb-1 opacity-80">Active Mission</p>
<p class="text-amber-900 text-sm font-bold leading-snug">
                        Tu racha de 14 días peligra. <br/>
<span class="text-red-800">¡FLEXIONA HOY!</span>
</p>
</div>
</div>
<!-- Stats and Action Footer -->
<div class="bg-slate-900/40 rounded-xl p-4 border border-slate-700/30 backdrop-blur-md">
<div class="flex justify-between items-end mb-3">
<div>
<p class="text-slate-400 text-xs font-medium uppercase tracking-widest mb-1">Current Progress</p>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary fill-1">local_fire_department</span>
<p class="text-slate-100 text-lg font-bold">14 Day Streak</p>
</div>
</div>
<!-- Go Button -->
<button class="bg-primary hover:bg-white text-abyss font-bold py-2 px-6 rounded-lg transition-colors flex items-center gap-2 shadow-[0_4px_0_#8db9ce]">
<span>GO</span>
<span class="material-symbols-outlined text-sm font-bold">arrow_forward_ios</span>
</button>
</div>
<!-- Progress Bar -->
<div class="relative w-full h-3 bg-slate-800 rounded-full overflow-hidden border border-slate-700">
<div class="absolute top-0 left-0 h-full bg-gradient-to-r from-primary/60 to-primary rounded-full" style="width: 93.3%;"></div>
</div>
<div class="flex justify-between mt-2">
<p class="text-primary/60 text-[10px] font-bold uppercase tracking-tighter">Day 14</p>
<p class="text-slate-500 text-[10px] font-bold uppercase tracking-tighter">Target: 15</p>
</div>
</div>
</div>
<!-- Bottom Navigation (Matching Provided Component Style) -->
<div class="flex gap-2 border-t border-slate-700/50 bg-slate-900/80 px-4 pb-6 pt-3 backdrop-blur-xl">
<a class="flex flex-1 flex-col items-center justify-end gap-1 rounded-full text-primary" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined fill-1">home</span>
</div>
<p class="text-xs font-medium leading-normal tracking-wide">Home</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">swords</span>
</div>
<p class="text-xs font-medium leading-normal tracking-wide">Missions</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">leaderboard</span>
</div>
<p class="text-xs font-medium leading-normal tracking-wide">Stats</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">person</span>
</div>
<p class="text-xs font-medium leading-normal tracking-wide">Profile</p>
</a>
</div>
<!-- Visual "Stitch" decoration for crafty theme -->
<div class="absolute top-0 left-0 w-full h-1 flex justify-around opacity-20">
<div class="w-4 h-full bg-white/40 rotate-45"></div>
<div class="w-4 h-full bg-white/40 -rotate-45"></div>
<div class="w-4 h-full bg-white/40 rotate-45"></div>
<div class="w-4 h-full bg-white/40 -rotate-45"></div>
<div class="w-4 h-full bg-white/40 rotate-45"></div>
</div>
</div>
