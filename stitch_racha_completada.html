<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e0f5ff",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1d23",
                        "widget-gray": "#222A35",
                        "accent-blue": "#8db9ce"
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-slate-900 font-display flex items-center justify-center min-h-screen p-4">
<!-- Android Widget Container -->
<div class="relative w-full max-w-[420px] aspect-[2/1] bg-widget-gray rounded-3xl p-6 shadow-2xl overflow-hidden ring-1 ring-white/10">
<!-- Texture Overlay (Cardboard/Felt feel simulation) -->
<div class="absolute inset-0 opacity-10 pointer-events-none bg-[url('https://www.transparenttextures.com/patterns/cardboard-flat.png')]" data-alt="Subtle cardboard texture overlay for widget background"></div>
<div class="relative flex h-full items-center gap-6">
<!-- Knight Crochet Illustration Section -->
<div class="flex-shrink-0 w-1/3 aspect-square relative group">
<!-- Outer felt glow -->
<div class="absolute inset-0 bg-primary/10 rounded-full blur-xl animate-pulse"></div>
<!-- Crocheted Mask Image -->
<div class="relative w-full h-full bg-center bg-no-repeat bg-contain" data-alt="Illustrated crochet mask of the Hollow Knight character" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuC91n8Ww7uITvguy03ejzt6GeeCRIVqsomcFDW1JZdUadIDaV_RL6k1yw8ur4SAVsWQO2XJkdSqEqvmWK4yIGoTHDlRlxIyHz0swbh4vH8dghglhrZe_0m5OtYbeGe--BIVSdwCYtwdqLYphEygS128VuLEPWW-9KXKpZ2hIvoscQ1sIMmFxzux4w491T0_BQ05_KL8D2U8_j3l6Mgc3WQJRpkoaDahB_WGVko1sNJqivTHOyZBqYDuzeIF09x3-LX21Glr4FWxs4jO')">
</div>
</div>
<!-- Content Section -->
<div class="flex-grow flex flex-col justify-center gap-3">
<!-- Floating Card Component -->
<div class="bg-slate-800/80 backdrop-blur-sm p-4 rounded-xl shadow-lg border border-white/5">
<div class="flex flex-col gap-1">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-primary text-sm" content="check_circle">check_circle</span>
<p class="text-accent-blue text-[10px] font-bold uppercase tracking-wider">MISIÓN COMPLETADA</p>
</div>
<p class="text-white text-sm font-bold leading-snug">¡Racha completada! <br/>
<span class="text-primary italic">Te has fortalecido hoy.</span></p>
</div>
</div>
<!-- Footer Stats -->
<div class="flex items-center justify-between px-1">
<div class="flex flex-col">
<p class="text-accent-blue text-xs font-medium">14 Day Streak</p>
<div class="flex gap-1 mt-1"><div class="h-1 w-4 bg-primary rounded-full"></div>
<div class="h-1 w-4 bg-primary rounded-full"></div>
<div class="h-1 w-4 bg-primary rounded-full"></div>
<div class="h-1 w-4 bg-primary rounded-full"></div></div>
</div>
<button class="bg-primary hover:bg-white text-widget-gray px-4 py-1.5 rounded-full text-xs font-bold transition-colors flex items-center gap-1">
                        GO
                        <span class="material-symbols-outlined text-xs">arrow_forward_ios</span>
</button>
</div>
</div>
</div>
<!-- Decorative Felt Edge -->
<div class="absolute top-0 right-0 w-16 h-16 -mr-8 -mt-8 bg-primary/5 rounded-full blur-2xl"></div>
</div>
</body></html>
