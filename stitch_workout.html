<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e0f5ff",
                        "background-light": "#f5f7f8",
                        "background-dark": "#12161D",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .crochet-texture {
            background-image: radial-gradient(circle at 2px 2px, rgba(224, 245, 255, 0.05) 1px, transparent 0);
            background-size: 8px 8px;
        }
        .amigurumi-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col overflow-x-hidden crochet-texture">
<!-- Top Navigation -->
<nav class="flex items-center justify-between p-6">
<button class="text-slate-900 dark:text-slate-100 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-3xl">arrow_back</span>
</button>
<h2 class="text-lg font-bold tracking-tight uppercase">Hollow Flex</h2>
<div class="w-8"></div> <!-- Spacer for centering -->
</nav>
<!-- Header: Amigurumi Set Containers -->
<div class="flex justify-center gap-6 px-4 py-8">
<!-- Set 1 (Active/Full) -->
<div class="flex flex-col items-center gap-2">
<div class="w-20 h-24 bg-primary/20 rounded-xl border-2 border-primary/40 flex items-center justify-center relative overflow-hidden amigurumi-shadow">
<div class="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/knitted-net.png')]"></div>
<span class="material-symbols-outlined text-primary text-4xl">favorite</span>
</div>
<span class="text-[10px] font-bold tracking-widest uppercase text-primary/60">SET 1</span>
</div>
<!-- Set 2 (Empty/Pending) -->
<div class="flex flex-col items-center gap-2">
<div class="w-20 h-24 bg-slate-800/40 rounded-xl border-2 border-slate-700 flex items-center justify-center relative overflow-hidden">
<div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/knitted-net.png')]"></div>
<span class="material-symbols-outlined text-slate-600 text-4xl">favorite</span>
</div>
<span class="text-[10px] font-bold tracking-widest uppercase text-slate-600">SET 2</span>
</div>
<!-- Set 3 (Empty/Pending) -->
<div class="flex flex-col items-center gap-2">
<div class="w-20 h-24 bg-slate-800/40 rounded-xl border-2 border-slate-700 flex items-center justify-center relative overflow-hidden">
<div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/knitted-net.png')]"></div>
<span class="material-symbols-outlined text-slate-600 text-4xl">favorite</span>
</div>
<span class="text-[10px] font-bold tracking-widest uppercase text-slate-600">SET 3</span>
</div>
</div>
<!-- Main Content: Counter -->
<main class="flex-1 flex flex-col items-center justify-center px-6">
<div class="relative">
<h1 class="text-white text-[140px] font-black leading-none tracking-tighter drop-shadow-2xl">
                12
            </h1>
<!-- Decorative crochet stitch element around the number -->
<div class="absolute -inset-4 border-4 border-dashed border-primary/10 rounded-full -z-10 animate-pulse"></div>
</div>
<h2 class="text-primary text-xl font-bold leading-tight tracking-[0.2em] uppercase mt-4">
            Flexiones Restantes
        </h2>
</main>
<!-- Footer: Interaction Zone -->
<footer class="p-8 pb-12 flex flex-col items-center gap-6">
<div class="relative group">
<!-- Large Amigurumi Style Button -->
<button class="relative z-10 flex flex-col items-center justify-center w-64 h-64 rounded-full bg-white text-background-dark transition-transform active:scale-95 shadow-[0_20px_50px_rgba(224,245,255,0.3)] border-8 border-primary/20 overflow-hidden">
<!-- Stitched Texture Overlay -->
<div class="absolute inset-0 opacity-30 pointer-events-none bg-[url('https://www.transparenttextures.com/patterns/white-diamond.png')]"></div>
